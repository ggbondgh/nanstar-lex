name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "app.js"
      - "capacitor.config.json"
      - "data/**"
      - "icons/**"
      - "index.html"
      - "manifest.webmanifest"
      - "package-lock.json"
      - "package.json"
      - "styles.css"
      - "sw.js"
      - "tools/build-android-debug.js"
      - "tools/build-capacitor-web.js"
      - "tools/write-update-manifest.js"

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build debug APK
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 0.1.${{ github.run_number }}
        run: npm run android:debug

      - name: Prepare release assets
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 0.1.${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/nanstar-lex.apk
          node tools/write-update-manifest.js

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nanstar-lex-debug-apk
          path: release/nanstar-lex.apk
          if-no-files-found: error

      - name: Publish latest Android release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: NanStar Lex Android 0.1.${{ github.run_number }}
          body_path: release/update.json
          make_latest: true
          overwrite_files: true
          files: |
            release/nanstar-lex.apk
            release/update.json
