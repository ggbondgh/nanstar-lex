name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "app.js"
      - "capacitor.config.json"
      - "data/**"
      - "icons/**"
      - "index.html"
      - "manifest.webmanifest"
      - "package-lock.json"
      - "package.json"
      - "styles.css"
      - "sw.js"
      - "tools/build-capacitor-web.js"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build debug APK
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 0.1.${{ github.run_number }}
        run: npm run android:debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nanstar-lex-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
